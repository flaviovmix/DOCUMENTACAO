<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arrays e Listas — Algoritmos — Nexus</title>
    <script src="../../../../js/layout.js"></script>
</head>
<body>

    <div class="home-header">
        <h1 class="home-title">Arrays e Listas</h1>
        <p class="home-sub">A estrutura mais básica — sequência indexada de itens</p>
    </div>

    <div class="audio-player" data-src="audio/arrays-listas.m4a">
        <audio preload="metadata"></audio>
        <button class="audio-btn" title="Play / Pause"></button>
        <div class="audio-progress-wrap">
            <input class="audio-seek" type="range" value="0" min="0" max="100" step="0.1">
            <div class="audio-progress-fill"></div>
        </div>
        <span class="audio-time">0:00 / 0:00</span>
    </div>

    <div class="info-accordion">
        <div class="info-row">
            <div class="info-row-header" onclick="this.parentElement.classList.toggle('open')">
                <span class="info-row-title">Em construção</span>
                <span class="info-row-btn">+</span>
            </div>
            <div class="info-row-body">
                <p>Conteúdo desta seção ainda será escrito.</p>
            </div>
        </div>
    </div>

</body>
</html>
