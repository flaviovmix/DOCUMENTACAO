<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplicação — Nexus</title>
    <script src="../../../../js/layout.js"></script>
</head>
<body>

    <div class="home-header">
        <h1 class="home-title">APLICAÇÃO</h1>
        <p class="home-sub">Camada 7 do OSI — protocolos que o usuário enxerga: HTTP, e-mail, transferência de arquivo</p>
    </div>

    <h2>Visão Geral</h2>

    <div class="audio-player" data-src="audio/visao-geral.m4a">
        <audio preload="metadata"></audio>
        <button class="audio-btn" title="Play / Pause"></button>
        <div class="audio-progress-wrap">
            <input class="audio-seek" type="range" value="0" min="0" max="100" step="0.1">
            <div class="audio-progress-fill"></div>
        </div>
        <span class="audio-time">0:00 / 0:00</span>
    </div>

    <div class="home-grid">

        <!-- HTTP -->
        <div class="card" data-href="http/http.html">
            <div class="card-menu btnMenuCard">
                <svg viewBox="0 0 350 350"><circle cx="39" cy="55" r="39"/><circle cx="39" cy="175" r="39"/><circle cx="39" cy="295" r="39"/><path d="M345,21H114c-3,0-5,2-5,5v58c0,3,2,5,5,5h231c3,0,5-2,5-5V26c0-3-2-5-5-5z"/><path d="M345,141H114c-3,0-5,2-5,5v58c0,3,2,5,5,5h231c3,0,5-2,5-5v-58c0-3-2-5-5-5z"/><path d="M345,261H114c-3,0-5,2-5,5v58c0,3,2,5,5,5h231c3,0,5-2,5-5v-58c0-3-2-5-5-5z"/></svg>
            </div>
            <div class="card-info">
                <div class="card-resumo">
                    <p>O protocolo da web — como navegador e servidor conversam. Métodos, status, headers, URL, cookies, cache, HTTPS e form data.</p>
                </div>
            </div>
            <div class="card-img">
                <img src="img/http.png" alt="HTTP">
            </div>
            <div class="card-bar">
                <a href="http/http.html" class="card-tag" style="--tag-clr:#6366f1;">HTTP</a>
            </div>
        </div>

    </div>

</body>
</html>
