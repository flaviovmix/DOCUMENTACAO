<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sessão — Nexus</title>
    <script src="../../../../js/layout.js"></script>
</head>
<body>

    <div class="home-header">
        <h1 class="home-title">SESSÃO</h1>
        <p class="home-sub">Camada 5 do OSI — abrir, manter e encerrar sessões entre processos (na prática, quase tudo migrou pra aplicação)</p>
    </div>

    <h2>Visão Geral</h2>

    <div class="audio-player" data-src="audio/visao-geral.m4a">
        <audio preload="metadata"></audio>
        <button class="audio-btn" title="Play / Pause"></button>
        <div class="audio-progress-wrap">
            <input class="audio-seek" type="range" value="0" min="0" max="100" step="0.1">
            <div class="audio-progress-fill"></div>
        </div>
        <span class="audio-time">0:00 / 0:00</span>
    </div>

    <div class="home-grid">
    </div>

</body>
</html>
