<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vMix — Audio Outputs — Nexus</title>
    <script src="../../../js/layout.js"></script>
</head>
<body>

<nav class="page-toc"></nav>

<h1>vMix — Audio Outputs</h1>

<div class="audio-player" data-src="audio/audio-outputs.m4a">
    <audio preload="metadata"></audio>
    <button class="audio-btn" title="Play / Pause"></button>
    <div class="audio-progress-wrap">
        <input class="audio-seek" type="range" value="0" min="0" max="100" step="0.1">
        <div class="audio-progress-fill"></div>
    </div>
    <span class="audio-time">0:00 / 0:00</span>
</div>

</body>
</html>
