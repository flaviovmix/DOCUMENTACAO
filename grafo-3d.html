    <style>
        .grafo-header { margin-bottom: 12px; }
        .grafo-header h1 {
            margin: 0 0 4px 0;
            font-size: 1.6em;
            color: #1e293b;
        }
        .grafo-header p { margin: 0; color: #64748b; font-size: 0.9em; }

        .grafo-legend {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            margin: 16px 0;
            padding: 12px 16px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
        }
        .grafo-legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8em;
            color: #334155;
        }
        .grafo-legend-dot {
            width: 12px; height: 12px;
            border-radius: 50%;
        }

        .grafo-wrap {
            width: 80vw;
            height: 70vh;
            margin-left: calc(50% - 40vw);
            position: relative;
            opacity: 0;
            animation: fadeIn 0.8s ease-out forwards;
        }
        #grafo-container {
            width: 100%;
            height: 100%;
            border: 1px solid #1e293b;
            border-radius: 10px;
            background: radial-gradient(ellipse at center, #1b1d2e 0%, #0f1020 100%);
            box-shadow: 0 4px 20px rgba(0,0,0,0.25), inset 0 0 80px rgba(0,0,0,0.3);
            overflow: hidden;
            position: relative;
        }
        .grafo-wrap:fullscreen,
        .grafo-wrap:-webkit-full-screen {
            width: 100vw;
            height: 100vh;
            margin-left: 0;
        }
        .grafo-wrap:fullscreen #grafo-container,
        .grafo-wrap:-webkit-full-screen #grafo-container {
            border-radius: 0;
            border: none;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .grafo-hint {
            margin-top: 10px;
            font-size: 0.8em;
            color: #94a3b8;
            text-align: center;
        }

        /* PREVIEW flutuante */
        #grafo-preview {
            position: fixed;
            width: 420px;
            height: 290px;
            background: rgba(15, 16, 32, 0.95);
            border: 1px solid rgba(99, 102, 241, 0.5);
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            z-index: 300;
            display: none;
            pointer-events: none;
            overflow: hidden;
            backdrop-filter: blur(8px);
        }
        .grafo-preview-header {
            padding: 8px 12px;
            color: #e2e8f0;
            font-size: 0.85em;
            font-weight: 500;
            border-bottom: 1px solid rgba(99, 102, 241, 0.3);
            background: rgba(30, 27, 46, 0.7);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .grafo-preview-header small {
            color: #94a3b8;
            font-weight: 400;
            margin-left: 8px;
            font-size: 0.85em;
        }
        .grafo-preview-body {
            width: 100%;
            height: calc(100% - 32px);
            position: relative;
            background: #fff;
            overflow: hidden;
        }
        .grafo-preview-body iframe {
            width: 1200px;
            height: 740px;
            border: none;
            transform: scale(0.35);
            transform-origin: 0 0;
            pointer-events: none;
        }
        .grafo-preview-loading {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #64748b;
            font-size: 0.85em;
        }

        /* Toggle 2D ↔ 3D */
        .grafo-switch {
            position: absolute;
            top: 12px;
            right: 12px;
            z-index: 10;
            display: flex;
            gap: 6px;
            background: rgba(15, 16, 32, 0.7);
            padding: 6px;
            border: 1px solid rgba(99, 102, 241, 0.4);
            border-radius: 8px;
            backdrop-filter: blur(6px);
        }
        .grafo-switch a {
            color: #cbd5e1;
            text-decoration: none;
            font-size: 0.78em;
            padding: 4px 10px;
            border-radius: 5px;
            transition: background 0.15s;
        }
        .grafo-switch a:hover,
        .grafo-switch button:hover { background: rgba(99, 102, 241, 0.25); color: #fff; }
        .grafo-switch a.active,
        .grafo-switch .grafo-mode.active {
            background: #6366f1;
            color: #fff;
        }
        .grafo-switch .grafo-mode {
            font-size: 0.78em;
            padding: 4px 10px;
            line-height: 1;
        }
        .grafo-switch button {
            background: transparent;
            border: none;
            color: #cbd5e1;
            cursor: pointer;
            line-height: 0;
            padding: 4px 6px;
            border-radius: 5px;
            transition: background 0.15s;
            display: flex;
            align-items: center;
        }
        .grafo-switch button svg {
            width: 14px;
            height: 14px;
            display: block;
        }
        .grafo-switch .grafo-divider {
            width: 1px;
            background: rgba(99, 102, 241, 0.3);
            margin: 0 2px;
        }

                            { id: 'f06',  label: '6. Spring Security',      group: 'fase0', url: 'pages/3-nexus/2-fase-0/6-spring-security-inicial/6-spring-security-inicial.html' },
                            { id: 'f07',  label: '7. Health Endpoint',      group: 'fase0', url: 'pages/3-nexus/2-fase-0/7-health-endpoint/7-health-endpoint.html' },
                            { id: 'f08',  label: '8. SvelteKit Setup',      group: 'fase0', url: 'pages/3-nexus/2-fase-0/8-sveltekit-setup/8-sveltekit-setup.html' },
                            { id: 'f09',  label: '9. Integração Fim a Fim', group: 'fase0', url: 'pages/3-nexus/2-fase-0/9-integracao-fim-a-fim/9-integracao-fim-a-fim.html' },
                            { id: 'f010', label: '10. Carta do Claude',     group: 'fase0', url: 'pages/3-nexus/2-fase-0/10-carta-do-claude/10-carta-do-claude.html' }
                        ]
                    },
                    { id: 'f1',  label: 'Fase 1 — MVP',     group: 'fase1',  url: 'pages/3-nexus/3-fase-1/fase-1.html' },
                    { id: 'fxn', label: 'Faxina — Fase 1',  group: 'faxina', url: 'pages/3-nexus/4-fase-1-faxina/fase-1-faxina.html' }
                ]
            },
            // ─── INTERFACE ────────────────────────────────────────────────
            {
                id: 'iface', label: 'Interface', group: 'interface',
                url: 'pages/7-interface/interface.html',
                children: [
                    { id: 'iface1', label: 'Visão Geral', group: 'interface', url: 'pages/7-interface/1-visao-geral/1-visao-geral.html' }
                ]
            },
            // ─── CLAUDE ───────────────────────────────────────────────────
            {
                id: 'claude', label: 'Claude', group: 'claude',
                url: 'pages/8-claude/claude.html',
                children: [
                    { id: 'claude1', label: 'Carta Aberta', group: 'claude', url: 'pages/8-claude/1-carta-aberta/1-carta-aberta.html' }
                ]
            },
            // ─── REFERÊNCIA ───────────────────────────────────────────────
            { id: 'ref', label: 'Referência', group: 'ref', url: 'referencia/index.html' }
        ]
    };

    // Cores por grupo (mesmas do 2D — formato hex pra three.js)
    var GROUP_COLORS = {
        root:         '#fbbf24',
        fund:         '#fb923c',
        java:         '#14b8a6',
        sql:          '#ec4899',
        osi:          '#0ea5e9',
        html:         '#ef4444',
        hw:           '#64748b',
        git:          '#dc2626',
        jasap:        '#f97316',
        nm:           '#a855f7',
        crud:         '#3b82f6',
        cr:           '#22d3ee',
        cd:           '#f43f5e',
        cc:           '#22c55e',
        cu:           '#f59e0b',
        func:         '#6366f1',
        linkbox:      '#818cf8',
        masterdetail: '#4f46e5',
        nexus:        '#10b981',
        componentes:  '#c084fc',
        fase0:        '#34d399',
        fase1:        '#059669',
        faxina:       '#047857',
        interface:    '#facc15',
        claude:       '#d946ef',
        ref:          '#cbd5e1'
    };

    // Percorre a árvore e gera nodes + edges
    var RAW_NODES = [];
    var RAW_EDGES = [];
    (function flatten(node, parentId) {
        RAW_NODES.push({
            id: node.id,
            label: node.label,
            group: node.group,
            url: node.url
        });
        if (parentId) RAW_EDGES.push({ source: parentId, target: node.id });
        (node.children || []).forEach(function(c) { flatten(c, node.id); });
    })(STRUCTURE, null);

    // Conta descendentes pra dimensionar nó
    var DESCENDANTS = {};
    (function countDesc(node) {
        var total = 0;
        (node.children || []).forEach(function(c) {
            total += 1 + countDesc(c);
        });
        DESCENDANTS[node.id] = total;
        return total;
    })(STRUCTURE);

    // Top-level (filhos diretos do root) — boost
    var TOP_LEVEL = {};
    (STRUCTURE.children || []).forEach(function(c) { TOP_LEVEL[c.id] = true; });

    // Mapa pra hover holofote
    var NEIGHBORS = {};
    var NODE_BY_ID = {};
    RAW_NODES.forEach(function(n) {
        NEIGHBORS[n.id] = new Set();
        NODE_BY_ID[n.id] = n;
    });
    RAW_EDGES.forEach(function(e) {
        NEIGHBORS[e.source].add(e.target);
        NEIGHBORS[e.target].add(e.source);
    });

    // ─── Espera container + libs ────────────────────────────────────────
    window.addEventListener('DOMContentLoaded', function() {
        var tries = 0;
        var interval = setInterval(function() {
            var container = document.getElementById('grafo-container');
            if (container && typeof ForceGraph3D !== 'undefined' && typeof THREE !== 'undefined' && typeof SpriteText !== 'undefined') {
                clearInterval(interval);
                renderGrafo3D(container);
            } else if (++tries > 200) {
                clearInterval(interval);
                console.error('Grafo 3D: container ou libs não carregaram.', {
                    forceGraph: typeof ForceGraph3D,
                    three: typeof THREE,
                    sprite: typeof SpriteText
                });
            }
        }, 50);
    });

    function renderGrafo3D(container) {
        function nodeSize(n) {
            var d = DESCENDANTS[n.id] || 0;
            var topBoost = TOP_LEVEL[n.id] ? 6 : 0;
            // nodeVal vira raio = cbrt(val); então elevamos pra que diferenças apareçam
            var r = 5 + Math.sqrt(d) * 4 + topBoost;
            return r * r * r / 80;
        }

        var hoveredId = null;
        var colorMode = 'colored';  // 'colored' | 'white'
        var Graph = ForceGraph3D()(container)
            .backgroundColor('rgba(0,0,0,0)')
            .graphData({ nodes: RAW_NODES, links: RAW_EDGES })
            .nodeId('id')
            .nodeRelSize(4)
            .nodeResolution(32)
            .nodeVal(nodeSize)
            .nodeColor(function(n) {
                var base = (colorMode === 'white') ? '#ffffff' : (GROUP_COLORS[n.group] || '#94a3b8');
                if (hoveredId === null) return base;
                var conn = NEIGHBORS[hoveredId];
                var active = (n.id === hoveredId) || (conn && conn.has(n.id));
                return active ? base : 'rgba(80,90,120,0.18)';
            })
            .nodeOpacity(0.95)
            .nodeThreeObjectExtend(true)
            .nodeThreeObject(function(n) {
                var sprite = new SpriteText(n.label);
                sprite.material.depthWrite = false;
                sprite.color = '#e2e8f0';
                sprite.textHeight = TOP_LEVEL[n.id] ? 5 : (DESCENDANTS[n.id] > 0 ? 4 : 3);
                sprite.position.y = 8 + Math.sqrt(DESCENDANTS[n.id] || 0) * 1.5;
                return sprite;
            })
            .linkColor(function(l) {
                if (hoveredId === null) return 'rgba(148,163,184,0.35)';
                var sId = (l.source && l.source.id) || l.source;
                var tId = (l.target && l.target.id) || l.target;
                var active = (sId === hoveredId || tId === hoveredId);
                return active ? '#ffffff' : 'rgba(148,163,184,0.05)';
            })
            .linkWidth(function(l) {
                if (hoveredId === null) return 0.5;
                var sId = (l.source && l.source.id) || l.source;
                var tId = (l.target && l.target.id) || l.target;
                return (sId === hoveredId || tId === hoveredId) ? 1.6 : 0.5;
            })
            .linkOpacity(0.6)
            .enableNodeDrag(true)
            .enableNavigationControls(true)
            .showNavInfo(false);

        // Repulsão um pouco maior pra ficar arejado
        var charge = Graph.d3Force('charge');
        if (charge) charge.strength(-120);

        // Auto-rotação manual: gira a câmera ao redor do eixo Y (visualmente
        // o "globo" gira no eixo X horizontal). Pausa durante drag e por 2s depois.
        var camAngle = 0;
        var camRadius = null;        // capturado após o fit inicial
        var camRotatePaused = false;
        var camRotateResumeTimer = null;
        var camSpeed = 0.0025;        // radianos por frame; suba pra acelerar

        // Pausa em qualquer movimento do mouse sobre o gráfico; retoma quando o
        // mouse fica parado por 800ms ou sai do container.
        function pauseRotation() {
            camRotatePaused = true;
            clearTimeout(camRotateResumeTimer);
        }
        function scheduleResume(delayMs) {
            clearTimeout(camRotateResumeTimer);
            camRotateResumeTimer = setTimeout(function() {
                // Não retoma enquanto a prévia da página estiver aberta
                var preview = document.getElementById('grafo-preview');
                if (preview && preview.style.display === 'block') return;
                var cam = Graph.cameraPosition();
                camRadius = Math.sqrt(cam.x * cam.x + cam.z * cam.z) || camRadius;
                camAngle = Math.atan2(cam.x, cam.z);
                camRotatePaused = false;
            }, delayMs);
        }
        container.addEventListener('mousemove', function() {
            pauseRotation();
            scheduleResume(800);
        });
        container.addEventListener('mouseleave', function() {
            scheduleResume(0);
        });

        (function rotateCam() {
            requestAnimationFrame(rotateCam);
            if (camRotatePaused || camRadius === null) return;
            camAngle += camSpeed;
            var cam = Graph.cameraPosition();
            Graph.cameraPosition({
                x: camRadius * Math.sin(camAngle),
                z: camRadius * Math.cos(camAngle),
                y: cam.y
            });
        })();

        // Captura raio inicial assim que a estabilização termina e o fit roda
        Graph.onEngineStop(function() {
            if (camRadius !== null) return;
            var cam = Graph.cameraPosition();
            camRadius = Math.sqrt(cam.x * cam.x + cam.z * cam.z);
            camAngle = Math.atan2(cam.x, cam.z);
        });

        // Resize on window
        function resize() {
            Graph.width(container.clientWidth);
            Graph.height(container.clientHeight);
        }
        resize();
        window.addEventListener('resize', resize);

        // Modo de cor (Colorido / Branco)
        document.querySelectorAll('.grafo-mode').forEach(function(btn) {
            btn.addEventListener('click', function() {
                colorMode = btn.dataset.mode;
                document.querySelectorAll('.grafo-mode').forEach(function(b) {
                    b.classList.toggle('active', b === btn);
                });
                Graph.nodeColor(Graph.nodeColor());
            });
        });

        // Fullscreen toggle
        var fsBtn = document.getElementById('grafo-fullscreen');
        var wrap  = document.getElementById('grafo-wrap');
        function toggleFullscreen() {
            var fsEl = document.fullscreenElement || document.webkitFullscreenElement;
            if (fsEl) {
                (document.exitFullscreen || document.webkitExitFullscreen).call(document);
            } else {
                (wrap.requestFullscreen || wrap.webkitRequestFullscreen).call(wrap);
            }
        }
        if (fsBtn) fsBtn.addEventListener('click', toggleFullscreen);
        document.addEventListener('keydown', function(e) {
            if (e.key === 'f' || e.key === 'F') {
                if (document.activeElement && document.activeElement.tagName === 'INPUT') return;
                toggleFullscreen();
            }
        });
        document.addEventListener('fullscreenchange', resize);
        document.addEventListener('webkitfullscreenchange', resize);

        // ─── Preview flutuante (iframe) ──────────────────────────
        var previewEl     = document.getElementById('grafo-preview');
        var previewHeader = previewEl.querySelector('.grafo-preview-header');
        var previewFrame  = previewEl.querySelector('iframe');
        var previewLoader = previewEl.querySelector('.grafo-preview-loading');
        var previewDelay  = null;
        var lastMouseX = 0, lastMouseY = 0;

        function positionPreview() {
            var pad = 20;
            var w = 420, h = 290;
            var x = lastMouseX + pad;
            var y = lastMouseY + pad;
            if (x + w > window.innerWidth)  x = lastMouseX - pad - w;
            if (y + h > window.innerHeight) y = window.innerHeight - h - pad;
            if (y < pad) y = pad;
            previewEl.style.left = x + 'px';
            previewEl.style.top  = y + 'px';
        }

        document.addEventListener('mousemove', function(e) {
            lastMouseX = e.clientX;
            lastMouseY = e.clientY;
            if (previewEl.style.display === 'block') positionPreview();
        });

        previewFrame.addEventListener('load', function() {
            previewLoader.style.display = 'none';
        });

        // Hover: holofote + preview
        Graph.onNodeHover(function(node) {
            hoveredId = node ? node.id : null;
            // força refresh dos atributos visuais
            Graph
                .nodeColor(Graph.nodeColor())
                .linkColor(Graph.linkColor())
                .linkWidth(Graph.linkWidth());

            if (!node) {
                clearTimeout(previewDelay);
                previewEl.style.display = 'none';
                container.style.cursor = 'default';
                scheduleResume(800);
                return;
            }
            container.style.cursor = 'pointer';
            pauseRotation();

            previewHeader.innerHTML = node.label + ' <small>' + node.url + '</small>';
            previewEl.style.display = 'block';
            positionPreview();

            clearTimeout(previewDelay);
            previewDelay = setTimeout(function() {
                if (previewFrame.getAttribute('src') !== node.url) {
                    previewLoader.style.display = 'block';
                    previewFrame.src = node.url;
                }
            }, 300);
        });

        // Duplo-clique abre a página (3d-force-graph não tem doubleClick nativo)
        var lastClick = { id: null, time: 0 };
        Graph.onNodeClick(function(node) {
            var now = Date.now();
            if (lastClick.id === node.id && now - lastClick.time < 350) {
                if (node.url) window.location.href = node.url;
                lastClick = { id: null, time: 0 };
                return;
            }
            lastClick = { id: node.id, time: now };
            // Single click: foca a câmera no nó
            var distance = 80;
            var distRatio = 1 + distance / Math.hypot(node.x || 1, node.y || 1, node.z || 1);
            Graph.cameraPosition(
                { x: (node.x || 0) * distRatio, y: (node.y || 0) * distRatio, z: (node.z || 0) * distRatio },
                node,
                1500
            );
        });
    }
    </script>
</head>
<body>

    <div class="grafo-header">
        <h1>Gráfico do site — 3D</h1>
        <p>Mapa em 3D de todas as páginas (<span id="grafo-count"></span> páginas). Arraste pra girar · scroll pra zoom · clique pra focar · duplo-clique abre.</p>
    </div>

    <div class="grafo-wrap" id="grafo-wrap">
        <div id="grafo-container"></div>
        <div class="grafo-switch">
            <button class="grafo-mode active" data-mode="colored">Colorido</button>
            <button class="grafo-mode" data-mode="white">Branco</button>
            <div class="grafo-divider"></div>
            <button id="grafo-fullscreen" title="Tela cheia (F)" aria-label="Tela cheia">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5"/>
                </svg>
            </button>
        </div>
    </div>

    <div id="grafo-preview">
        <div class="grafo-preview-header"></div>
        <div class="grafo-preview-body">
            <div class="grafo-preview-loading">carregando…</div>
            <iframe></iframe>
        </div>
    </div>

    <p class="grafo-hint">Arraste pra girar a esfera · scroll pra zoom · hover acende conexões e mostra prévia · duplo-clique abre a página</p>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var wait = setInterval(function() {
                var el = document.getElementById('grafo-count');
                if (el) {
                    el.textContent = RAW_NODES.length;
                    clearInterval(wait);
                }
            }, 50);
        });
    </script>

</body>
