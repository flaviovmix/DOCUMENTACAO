    <style>
        .grafo-header { margin-bottom: 12px; display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap; }
        .grafo-header h1 {
            margin: 0 0 4px 0;
            font-size: 1.6em;
            color: #1e293b;
        }
        .grafo-header p { margin: 0; color: #64748b; font-size: 0.9em; }
        .grafo-header a {
            color: #6366f1; text-decoration: none; font-size: 0.85em;
            padding: 4px 10px; border: 1px solid #6366f1; border-radius: 6px;
        }
        .grafo-header a:hover { background: #6366f1; color: white; }

        #grafo-container {
            width: 100%;
            height: calc(100vh - 180px);
            min-height: 520px;
            border: 1px solid #1e293b;
            border-radius: 10px;
            background:
                linear-gradient(rgba(15, 16, 32, 0.55), rgba(15, 16, 32, 0.80)),
                url('img/grafo-bg.png') center/cover no-repeat;
            box-shadow: 0 4px 20px rgba(0,0,0,0.25), inset 0 0 80px rgba(0,0,0,0.3);
            opacity: 0;
            animation: fadeIn 0.8s ease-out forwards;
            overflow: hidden;
            position: relative;
            isolation: isolate;   /* stacking context próprio pro botão fullscreen */
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .grafo-hint {
            margin-top: 10px;
            font-size: 0.8em;
            color: #94a3b8;
            text-align: center;
        }

        /* Botão tela cheia — no canto superior direito do header (.grafo-header é flex) */
        #grafo-fullscreen {
            margin-left: auto;
            width: 36px; height: 36px;
            background: rgba(15, 16, 32, 0.85);
            border: 1px solid rgba(99, 102, 241, 0.7);
            border-radius: 6px;
            color: #e2e8f0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s, border-color 0.15s, transform 0.15s;
            padding: 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        #grafo-fullscreen:hover {
            background: rgba(99, 102, 241, 0.3);
            border-color: rgba(99, 102, 241, 0.9);
            transform: scale(1.05);
        }
        #grafo-fullscreen svg { display: block; pointer-events: none; }
        #grafo-container:fullscreen {
            height: 100vh; width: 100vw;
            border-radius: 0; border: none;
        }
        #grafo-container:-webkit-full-screen {
            height: 100vh; width: 100vw;
            border-radius: 0; border: none;
        }

        /* PREVIEW flutuante */
        #grafo-preview {
            position: absolute;
            width: 420px;
            height: 290px;
            background: rgba(15, 16, 32, 0.95);
            border: 1px solid rgba(99, 102, 241, 0.5);
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            z-index: 300;
            display: none;
            pointer-events: none;
            overflow: hidden;
            backdrop-filter: blur(8px);
        }
        .grafo-preview-header {
            padding: 8px 12px;
            color: #e2e8f0;
            font-size: 0.85em;
            font-weight: 500;
            border-bottom: 1px solid rgba(99, 102, 241, 0.3);
            background: rgba(30, 27, 46, 0.7);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .grafo-preview-header small {
            color: #94a3b8;
            font-weight: 400;
            margin-left: 8px;
            font-size: 0.85em;
        }
        .grafo-preview-body {
            width: 100%;
            height: calc(100% - 32px);
            position: relative;
            background: #fff;
            overflow: hidden;
        }
        .grafo-preview-body iframe {
            width: 1200px;
            height: 740px;
            border: none;
            transform: scale(0.35);
            transform-origin: 0 0;
            pointer-events: none;
        }
        .grafo-preview-loading {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #64748b;
            font-size: 0.85em;
        }

                id: 'iface', label: 'Interface', group: 'interface',
                url: 'pages/7-interface/interface.html',
                children: [
                    { id: 'iface1', label: 'Visão Geral', group: 'interface', url: 'pages/7-interface/1-visao-geral/1-visao-geral.html' }
                ]
            },
            {
                id: 'claude', label: 'Claude', group: 'claude',
                url: 'pages/8-claude/claude.html',
                children: [
                    { id: 'claude1', label: 'Carta Aberta', group: 'claude', url: 'pages/8-claude/1-carta-aberta/1-carta-aberta.html' }
                ]
            },
            { id: 'ref', label: 'Referência', group: 'ref', url: 'referencia/index.html' }
        ]
    };

    // Flatten árvore → nodes + links
    var RAW_NODES = [];
    var RAW_LINKS = [];
    (function flatten(node, parentId) {
        RAW_NODES.push({
            id: node.id,
            label: node.label,
            group: node.group,
            url: node.url
        });
        if (parentId) RAW_LINKS.push({ source: parentId, target: node.id });
        (node.children || []).forEach(function(c) { flatten(c, node.id); });
    })(STRUCTURE, null);

    // Conta descendentes (pra dimensionar)
    var DESCENDANTS = {};
    (function countDesc(node) {
        var total = 0;
        (node.children || []).forEach(function(c) {
            total += 1 + countDesc(c);
        });
        DESCENDANTS[node.id] = total;
        return total;
    })(STRUCTURE);

    // Top-level boost
    var TOP_LEVEL = {};
    (STRUCTURE.children || []).forEach(function(c) { TOP_LEVEL[c.id] = true; });

    // ─── Render ────────────────────────────────────────────────────────
    window.addEventListener('DOMContentLoaded', function() {
        var tries = 0;
        var interval = setInterval(function() {
            var container = document.getElementById('grafo-container');
            var ready = container && typeof ForceGraph3D !== 'undefined' && typeof THREE !== 'undefined';
            if (ready) {
                clearInterval(interval);
                renderGrafo3D(container);
            } else if (++tries > 200) {
                clearInterval(interval);
                console.error('Grafo 3D: container, THREE ou ForceGraph3D não carregaram.');
            }
        }, 50);
    });

    function renderGrafo3D(container) {
        // Adiciona dados extras nos nodes
        var nodes = RAW_NODES.map(function(n) {
            var d = DESCENDANTS[n.id] || 0;
            return Object.assign({}, n, {
                descendants: d,
                top: !!TOP_LEVEL[n.id]
            });
        });

        // Cache de materiais (pra holofote no hover)
        var nodeMaterials = {};

        // Cria sprite branco (canvas circle) — billboard 2D no espaço 3D
        function makeCircleSprite(node) {
            var canvas = document.createElement('canvas');
            var size = 64;
            canvas.width = size;
            canvas.height = size;
            var ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, size, size);
            // Glow externo
            var gradient = ctx.createRadialGradient(size/2, size/2, size/4, size/2, size/2, size/2);
            gradient.addColorStop(0, 'rgba(255,255,255,1)');
            gradient.addColorStop(0.55, 'rgba(255,255,255,1)');
            gradient.addColorStop(0.62, 'rgba(99,102,241,0.35)');
            gradient.addColorStop(1, 'rgba(99,102,241,0)');
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(size/2, size/2, size/2, 0, Math.PI * 2);
            ctx.fill();

            var texture = new THREE.CanvasTexture(canvas);
            texture.minFilter = THREE.LinearFilter;
            var material = new THREE.SpriteMaterial({
                map: texture,
                transparent: true,
                depthWrite: false
            });
            nodeMaterials[node.id] = material;
            var sprite = new THREE.Sprite(material);
            var d = node.descendants || 0;
            var topBoost = node.top ? 4 : 0;
            var s = 5 + Math.sqrt(d) * 2.2 + topBoost;
            sprite.scale.set(s, s, 1);
            return sprite;
        }

        var Graph = ForceGraph3D({ rendererConfig: { alpha: true, antialias: true } })(container)
            .graphData({ nodes: nodes, links: RAW_LINKS })
            .backgroundColor('rgba(0,0,0,0)')      // usa o radial-gradient do CSS
            .enableNavigationControls(true)
            .enablePointerInteraction(true)
            .showNavInfo(false)
            .nodeLabel(function(n) { return n.label + ' — ' + n.url; })
            .nodeThreeObject(makeCircleSprite)
            .nodeThreeObjectExtend(false)
            .linkColor(function() { return 'rgba(203, 213, 225, 0.75)'; })
            .linkWidth(0.4)
            .linkOpacity(0.6)
            .cooldownTicks(120)
            .cooldownTime(6000);

        if (typeof Graph.autoPauseRedraw === 'function') Graph.autoPauseRedraw(false);
        if (typeof Graph.resumeAnimation === 'function') Graph.resumeAnimation();

        // Força física: ajusta pra ficar mais espaçado (sem amontoar)
        Graph.d3Force('charge').strength(-180);
        if (Graph.d3Force('link')) Graph.d3Force('link').distance(40);

        var nodeIds = nodes.map(function(n) { return n.id; });
        var connectedByNode = {};
        nodeIds.forEach(function(id) { connectedByNode[id] = new Set([id]); });
        RAW_LINKS.forEach(function(l) {
            var s = typeof l.source === 'object' ? l.source.id : l.source;
            var t = typeof l.target === 'object' ? l.target.id : l.target;
            connectedByNode[s].add(t);
            connectedByNode[t].add(s);
        });

        // ─── Hover holofote ────────────────────────────────────────
        function setHighlight(node) {
            if (!node) {
                nodeIds.forEach(function(id) {
                    nodeMaterials[id].opacity = 1;
                });
                Graph.linkColor(function() { return 'rgba(203, 213, 225, 0.75)'; })
                     .linkWidth(0.4);
                container.style.cursor = '';
                return;
            }

            container.style.cursor = 'pointer';

            var connected = connectedByNode[node.id];
            nodeIds.forEach(function(id) {
                nodeMaterials[id].opacity = connected.has(id) ? 1 : 0.12;
            });

            Graph.linkColor(function(l) {
                var s = typeof l.source === 'object' ? l.source.id : l.source;
                var t = typeof l.target === 'object' ? l.target.id : l.target;
                var active = (s === node.id || t === node.id);
                return active ? '#ffffff' : 'rgba(148, 163, 184, 0.05)';
            }).linkWidth(function(l) {
                var s = typeof l.source === 'object' ? l.source.id : l.source;
                var t = typeof l.target === 'object' ? l.target.id : l.target;
                return (s === node.id || t === node.id) ? 1.5 : 0.4;
            });
        }

        var hoveredId = null;

        // ─── Click vs Duplo-clique (3d-force-graph só dá click simples) ──
        var lastClickTime = 0;
        var lastClickId = null;
        Graph.onNodeClick(function(node) {
            var now = Date.now();
            if (lastClickId === node.id && (now - lastClickTime) < 400) {
                if (node.url) window.location.href = node.url;
                lastClickTime = 0;
                lastClickId = null;
                return;
            }
            lastClickTime = now;
            lastClickId = node.id;
        });

        // ─── Preview flutuante (igual ao 2D) ──────────────────────
        var previewEl     = document.getElementById('grafo-preview');
        var previewHeader = previewEl.querySelector('.grafo-preview-header');
        var previewFrame  = previewEl.querySelector('iframe');
        var previewLoader = previewEl.querySelector('.grafo-preview-loading');
        var previewDelay  = null;
        var previewUnload = null;
        var previewEnabled = true;
        var lastMouseX = 0, lastMouseY = 0;
        var isDragging = false;

        if (previewEl.parentNode !== container) container.appendChild(previewEl);
        previewFrame.setAttribute('loading', 'lazy');

        // Suprime preview enquanto o usuário arrasta o grafo (botão pressionado)
        container.addEventListener('pointerdown', function() {
            isDragging = true;
            hidePreview();
        }, { passive: true });
        window.addEventListener('pointerup', function() {
            isDragging = false;
        }, { passive: true });
        window.addEventListener('pointercancel', function() {
            isDragging = false;
        }, { passive: true });

        function positionPreview() {
            var rect = container.getBoundingClientRect();
            var pad = 20;
            var w = 420, h = 290;
            var localX = lastMouseX - rect.left;
            var localY = lastMouseY - rect.top;
            var x = localX + pad;
            var y = localY + pad;
            if (x + w > rect.width)  x = localX - pad - w;
            if (y + h > rect.height) y = rect.height - h - pad;
            if (x < pad) x = pad;
            if (y < pad) y = pad;
            previewEl.style.left = x + 'px';
            previewEl.style.top  = y + 'px';
        }

        document.addEventListener('mousemove', function(e) {
            lastMouseX = e.clientX;
            lastMouseY = e.clientY;
            if (previewEl.style.display === 'block') positionPreview();
        });

        previewFrame.addEventListener('load', function() {
            previewLoader.style.display = 'none';
        });

        function hidePreview() {
            clearTimeout(previewDelay);
            previewEl.style.display = 'none';
            clearTimeout(previewUnload);
            previewUnload = setTimeout(function() {
                previewFrame.removeAttribute('src');
                previewLoader.style.display = 'none';
            }, 250);
        }

        function setPreviewHeader(node) {
            var small = document.createElement('small');
            small.textContent = node.url;
            previewHeader.textContent = node.label + ' ';
            previewHeader.appendChild(small);
        }

        // Refaz onNodeHover combinando holofote + preview
        Graph.onNodeHover(function(node) {
            // ── holofote ──
            var newId = node ? node.id : null;
            if (newId !== hoveredId) {
                hoveredId = newId;
                setHighlight(node);
            }

            // ── preview ──
            if (!previewEnabled || isDragging || !node || !node.url) {
                hidePreview();
                return;
            }
            setPreviewHeader(node);
            previewEl.style.display = 'block';
            positionPreview();
            clearTimeout(previewUnload);
            clearTimeout(previewDelay);
            previewDelay = setTimeout(function() {
                if (isDragging) return;
                if (previewFrame.getAttribute('src') !== node.url) {
                    previewLoader.style.display = 'block';
                    previewFrame.src = node.url;
                }
            }, 1500);
        });

        // ─── Resize handler ───────────────────────────────────────
        function resize() {
            Graph.width(container.clientWidth);
            Graph.height(container.clientHeight);
        }
        resize();
        window.addEventListener('resize', resize);

        // ─── Botão fullscreen ─────────────────────────────────────
        var fsBtn  = document.getElementById('grafo-fullscreen');
        var fsIcon = document.getElementById('grafo-fullscreen-icon');
        var ICON_EXPAND   = '<polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>';
        var ICON_COLLAPSE = '<polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="14" y1="10" x2="21" y2="3"/><line x1="3" y1="21" x2="10" y2="14"/>';

        function isFullscreen() {
            return document.fullscreenElement || document.webkitFullscreenElement;
        }
        function toggleFullscreen() {
            if (!isFullscreen()) {
                (container.requestFullscreen || container.webkitRequestFullscreen).call(container);
            } else {
                (document.exitFullscreen || document.webkitExitFullscreen).call(document);
            }
        }
        if (fsBtn) fsBtn.addEventListener('click', toggleFullscreen);

        // Atualiza ícone + redimensiona canvas
        function onFsChange() {
            if (fsIcon) fsIcon.innerHTML = isFullscreen() ? ICON_COLLAPSE : ICON_EXPAND;
            setTimeout(resize, 80);
        }
        document.addEventListener('fullscreenchange',       onFsChange);
        document.addEventListener('webkitfullscreenchange', onFsChange);

        // Atalho de teclado: F
        document.addEventListener('keydown', function(e) {
            if (e.key === 'f' || e.key === 'F') {
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
                toggleFullscreen();
            }
        });

        // ─── Auto-rotação leve, coexistindo com OrbitControls ──
        var controls = Graph.controls();

        if (controls) {
            controls.enabled = true;            // garante interação manual
            controls.enableRotate = true;
            controls.enableZoom = true;
            controls.enablePan = true;
            controls.autoRotate = false; // auto-orbit custom abaixo cobre os 3 eixos
            controls.enableDamping = true;
            controls.dampingFactor = 0.1;
        }

        function wakeGraph() {
            if (typeof Graph.resumeAnimation === 'function') Graph.resumeAnimation();
        }
        ['pointerdown', 'pointermove', 'wheel', 'touchstart', 'touchmove'].forEach(function(eventName) {
            container.addEventListener(eventName, wakeGraph, { passive: true });
        });
        if (controls && controls.addEventListener) controls.addEventListener('change', wakeGraph);

        Graph.onEngineStop(function() {
            wakeGraph();
        });

        // ─── Auto-orbit nos 3 eixos (Lissajous) ───────────────────
        // OrbitControls.autoRotate só gira em azimute (1 eixo). Aqui a câmera
        // anda numa curva paramétrica com frequências distintas em x/y/z, dando
        // a impressão de rotação nos 3 eixos. Pausa enquanto o usuário arrasta
        // e retoma 2,5s depois (deixa o damping decair antes).
        var orbitT = 0;
        var orbitRadius = 320;
        var orbitPaused = false;
        var orbitResumeTimer = null;

        container.addEventListener('pointerdown', function() {
            orbitPaused = true;
            clearTimeout(orbitResumeTimer);
        }, { passive: true });
        window.addEventListener('pointerup', function() {
            clearTimeout(orbitResumeTimer);
            orbitResumeTimer = setTimeout(function() { orbitPaused = false; }, 2500);
        }, { passive: true });
        window.addEventListener('pointercancel', function() {
            clearTimeout(orbitResumeTimer);
            orbitResumeTimer = setTimeout(function() { orbitPaused = false; }, 2500);
        }, { passive: true });

        (function tickOrbit() {
            if (!orbitPaused) {
                orbitT += 0.0025;
                Graph.cameraPosition({
                    x: orbitRadius * Math.sin(orbitT * 1.0),
                    y: orbitRadius * Math.sin(orbitT * 0.7) * 0.55,
                    z: orbitRadius * Math.cos(orbitT * 1.0)
                }, undefined, 0);
            }
            requestAnimationFrame(tickOrbit);
        })();

        // Atualiza contador
        var countEl = document.getElementById('grafo-count');
        if (countEl) countEl.textContent = RAW_NODES.length;
    }
    </script>
</head>
<body>

    <div class="grafo-header">
        <h1>Gráfico 3D do site</h1>
        <p>Mapa em 3D (<span id="grafo-count"></span> páginas). Arraste pra rotacionar · scroll zoom · duplo-clique abre.</p>
        <a href="grafo.html">← versão 2D</a>
        <button id="grafo-fullscreen" title="Tela cheia (F)">
            <svg id="grafo-fullscreen-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 3 21 3 21 9"/>
                <polyline points="9 21 3 21 3 15"/>
                <line x1="21" y1="3" x2="14" y2="10"/>
                <line x1="3" y1="21" x2="10" y2="14"/>
            </svg>
        </button>
    </div>

    <div id="grafo-container"></div>

    <div id="grafo-preview">
        <div class="grafo-preview-header"></div>
        <div class="grafo-preview-body">
            <div class="grafo-preview-loading">carregando…</div>
            <iframe></iframe>
        </div>
    </div>

    <p class="grafo-hint">Arraste com o botão esquerdo (rotaciona) · botão direito (pan) · scroll zoom · hover acende conexões e mostra prévia · duplo-clique abre a página</p>

</body>
</html>
